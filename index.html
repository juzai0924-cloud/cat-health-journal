<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f3ec"><meta name="description" content="记录猫咪驱虫和不适情况，按时提醒，随时回顾。">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; worker-src 'self'">
  <link rel="manifest" href="./manifest.webmanifest"><link rel="stylesheet" href="./styles.css?v=11"><title>猫咪健康簿</title>
</head>
<body>
<div class="app-shell" id="appShell">
  <header class="topbar"><div><p class="eyebrow" id="todayText"></p><h1>猫咪健康簿</h1></div><button class="avatar-button" id="petButton" aria-label="编辑猫咪信息">🐈</button></header>
  <aside class="demo-banner" id="demoBanner" hidden><span><b>示例体验模式</b> · 所有修改将在刷新后重置</span><button id="exitDemoTop" type="button">退出</button></aside>
  <main>
    <section class="view active" id="homeView">
      <article class="hero-card"><div><p class="muted">今天的健康状态</p><h2 id="greetingText">先完善猫咪信息吧</h2><p id="healthSummary">记录每一次照顾，回顾时更安心。</p></div><span class="hero-cat">🐾</span></article>
      <div class="section-heading"><div><p class="eyebrow">CARE PLAN</p><h2>驱虫计划</h2></div><button class="text-button" data-open="settings">管理周期</button></div>
      <div class="care-grid" id="careCards"></div>
      <div class="section-heading"><div><p class="eyebrow">QUICK ADD</p><h2>快速记录</h2></div></div>
      <div class="quick-grid"><button class="quick-card coral" data-action="add-symptom"><span>＋</span><strong>记录不适</strong><small>呕吐、软便、泪痕…</small></button><button class="quick-card mint" data-action="add-deworming"><span>✓</span><strong>记录驱虫</strong><small>自动计算下次日期</small></button></div>
      <div class="section-heading"><div><p class="eyebrow">RECENT</p><h2>最近记录</h2></div><button class="text-button" data-nav="timeline">查看全部</button></div><div id="recentRecords" class="record-list"></div>
    </section>
    <section class="view" id="timelineView"><div class="page-title"><p class="eyebrow">HEALTH TIMELINE</p><h2>健康时间线</h2><p class="muted">把零散情况变成连续、可回顾的记录。</p></div><div class="filter-row"><button class="chip active" data-filter="all">全部</button><button class="chip" data-filter="symptom">不适</button><button class="chip" data-filter="deworming">驱虫</button></div><div id="timelineRecords" class="record-list spacious"></div></section>
    <section class="view" id="settingsView"><div class="page-title"><p class="eyebrow">SETTINGS</p><h2>设置与数据</h2><p class="muted">周期可以跟随药品变化随时调整。</p></div><div class="settings-card"><button class="setting-row" id="editPetRow"><span><b>猫咪信息</b><small id="petRowHint">未设置</small></span><i>›</i></button><button class="setting-row" id="editPlanRow"><span><b>驱虫周期</b><small id="planRowHint"></small></span><i>›</i></button><button class="setting-row" id="editTypesRow"><span><b>不适类型</b><small id="typesRowHint"></small></span><i>›</i></button></div><div class="settings-card" id="localDataCard"><button class="setting-row" id="exportButton"><span><b>备份全部数据</b><small>导出 JSON 文件</small></span><i>↓</i></button><label class="setting-row" for="importInput"><span><b>恢复备份</b><small>从 JSON 文件导入</small></span><i>↑</i></label><input id="importInput" type="file" accept="application/json" hidden><button class="setting-row" id="clearDataButton"><span><b>清除本机数据</b><small>删除当前浏览器中的全部记录</small></span><i>×</i></button></div><div class="settings-card" id="demoDataCard" hidden><button class="setting-row" id="exitDemoSettings"><span><b>退出示例体验</b><small>返回我的本地数据</small></span><i>›</i></button></div><p class="privacy-note" id="privacyNote">🔒 所有记录和照片只保存在当前设备浏览器中，不会上传服务器。清理浏览器数据或换设备前请先备份。</p></section>
  </main>
  <nav class="bottom-nav"><button class="nav-item active" data-nav="home"><span>⌂</span>首页</button><button class="nav-add" data-action="open-add" aria-label="添加记录">＋</button><button class="nav-item" data-nav="timeline"><span>◷</span>时间线</button><button class="nav-item" data-nav="settings"><span>⚙</span>设置</button></nav>
</div>
<div class="sheet-backdrop" id="sheetBackdrop" hidden></div><section class="sheet" id="sheet" role="dialog" hidden><div class="sheet-handle"></div><div id="sheetContent"></div></section><div class="toast" id="toast" role="status"></div>
<script src="./app.js?v=11" defer></script>
</body></html>
